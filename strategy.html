<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>策略中心 — AI Investor</title>
  <meta name="description" content="AI Investor A股量化策略追踪中心" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f9f6f1; --ink: #0f0f0f; --muted: #6b6b6b; --rule: #0f0f0f;
      --accent: #c8392b; --green: #1a7a4a; --amber: #b06000;
      --card: #f2ede5; --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.6; min-height: 100vh; }
    .wrap { width: min(1100px, calc(100% - 48px)); margin: 0 auto; }

    /* NAV */
    nav { border-bottom: 1.5px solid var(--rule); padding: 18px 0; display: flex; align-items: center; justify-content: space-between; }
    .back-link { font-size: 13px; font-weight: 500; letter-spacing: .06em; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color .15s; }
    .back-link:hover { color: var(--ink); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .update-label { font-size: 12px; color: var(--muted); }
    .gh-link { font-size: 12px; font-weight: 500; letter-spacing: .08em; color: var(--muted); text-decoration: none; border: 1px solid currentColor; padding: 5px 12px; transition: color .15s, border-color .15s; }
    .gh-link:hover { color: var(--ink); border-color: var(--ink); }

    /* PAGE HEADER */
    .page-header { padding: 40px 0 32px; border-bottom: 1.5px solid var(--rule); }
    .page-title { font-family: var(--serif); font-size: clamp(36px,5vw,64px); line-height: 1; letter-spacing: -.02em; margin-bottom: 12px; }
    .page-title em { font-style: italic; color: var(--accent); }
    .page-desc { font-size: 14px; color: var(--muted); max-width: 560px; line-height: 1.7; }

    /* TABS */
    .tabs { display: flex; gap: 0; border-bottom: 1.5px solid var(--rule); margin-top: 0; }
    .tab-btn { font-family: var(--sans); font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; background: transparent; border: none; border-bottom: 3px solid transparent; padding: 18px 24px 15px; cursor: pointer; color: var(--muted); transition: color .15s, border-color .15s; margin-bottom: -1.5px; }
    .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
    .tab-btn:hover:not(.active) { color: var(--ink); }
    .tab-pane { display: none; padding: 36px 0; }
    .tab-pane.active { display: block; }

    /* MARKET SECTIONS */
    .market-section { margin-bottom: 48px; }
    .market-heading { font-family: var(--serif); font-size: clamp(20px,2.5vw,28px); letter-spacing: -.01em; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
    .market-badge { font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); padding: 3px 10px; border: 1px solid var(--accent); font-family: var(--sans); }

    /* PATH LABEL */
    .path-label { font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; padding-top: 16px; border-top: 1px solid #e0d8cc; }
    .path-label:first-child { border-top: none; padding-top: 0; }

    /* STRATEGY CARDS */
    .strategy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0; border-top: 1.5px solid var(--ink); border-left: 1.5px solid var(--ink); margin-bottom: 8px; }
    .strategy-card { background: var(--bg); padding: 22px 20px; cursor: pointer; transition: background .15s; position: relative; border-right: 1.5px solid var(--ink); border-bottom: 1.5px solid var(--ink); }
    .strategy-card:hover { background: var(--card); }
    .strategy-card.is-risk-off { opacity: .7; }
    .card-window { font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .card-name { font-family: var(--serif); font-size: 14px; line-height: 1.4; margin-bottom: 14px; min-height: 48px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
    .metric { }
    .metric-label { font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
    .metric-val { font-size: 16px; font-weight: 600; letter-spacing: -.01em; }
    .metric-val.pos { color: var(--green); }
    .metric-val.neg { color: var(--accent); }
    .metric-val.neu { color: var(--ink); }
    .card-footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid #e0d8cc; display: flex; align-items: center; justify-content: space-between; }
    .risk-badge { font-size: 11px; font-weight: 600; letter-spacing: .08em; padding: 3px 8px; }
    .risk-badge.risk_on { background: #d4edda; color: #155724; }
    .risk-badge.caution { background: #fff3cd; color: #856404; }
    .risk-badge.risk_off { background: #f8d7da; color: #721c24; }
    .risk-badge.unknown { background: #e2e3e5; color: #383d41; }
    .exposure-val { font-size: 12px; color: var(--muted); }
    .card-arrow { position: absolute; top: 20px; right: 16px; font-size: 14px; color: var(--muted); opacity: 0; transition: opacity .15s; }
    .strategy-card:hover .card-arrow { opacity: 1; }

    /* CHART SECTION */
    .chart-section { margin-top: 40px; border-top: 1.5px solid var(--rule); padding-top: 32px; }
    .chart-title { font-family: var(--serif); font-size: clamp(18px,2.5vw,26px); letter-spacing: -.01em; margin-bottom: 24px; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .chart-wrap { background: var(--card); padding: 20px; }
    .chart-label { font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .chart-canvas-wrap { position: relative; height: 220px; }

    /* TAB 2 — DETAIL */
    .detail-selector { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .detail-selector label { font-size: 13px; font-weight: 600; letter-spacing: .06em; color: var(--muted); }
    .strategy-select { font-family: var(--sans); font-size: 14px; padding: 10px 16px; border: 1.5px solid var(--ink); background: var(--bg); color: var(--ink); cursor: pointer; min-width: 360px; max-width: 100%; }
    .detail-content { }
    .detail-header { padding-bottom: 24px; border-bottom: 1.5px solid var(--rule); margin-bottom: 28px; }
    .detail-name { font-family: var(--serif); font-size: clamp(22px,3vw,36px); line-height: 1.15; letter-spacing: -.01em; margin-bottom: 8px; }
    .detail-meta { font-size: 13px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 16px; }
    .detail-meta span { display: flex; align-items: center; gap: 4px; }
    .detail-section-title { font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

    /* WINDOW METRICS TABLE */
    .window-table { width: 100%; border-collapse: collapse; margin-bottom: 32px; }
    .window-table th { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: 8px 12px; text-align: left; border-bottom: 1.5px solid var(--rule); }
    .window-table td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid #e0d8cc; }
    .window-table tr.highlight td { background: var(--card); }

    /* HOLDINGS */
    .holdings-wrap { margin-bottom: 32px; }
    .holdings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0; border-top: 1.5px solid var(--ink); border-left: 1.5px solid var(--ink); }
    .holding-item { background: var(--bg); padding: 12px 14px; border-right: 1.5px solid var(--ink); border-bottom: 1.5px solid var(--ink); }
    .holding-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .holding-name { font-size: 14px; font-weight: 500; }
    .holding-code { font-size: 11px; color: var(--muted); font-family: monospace; }
    .holding-weight { font-size: 15px; font-weight: 600; }
    .holding-bar-wrap { height: 2px; background: #e0d8cc; }
    .holding-bar { height: 100%; background: var(--accent); }
    .cash-holding { background: var(--card); }

    /* STATES */
    .state-msg { padding: 56px 0; text-align: center; font-size: 14px; color: var(--muted); letter-spacing: .06em; }

    /* FOOTER */
    footer { border-top: 1.5px solid var(--rule); padding: 28px 0; display: flex; align-items: center; justify-content: space-between; }
    .footer-copy { font-size: 12px; color: var(--muted); }
    .footer-email { font-size: 12px; color: var(--muted); text-decoration: none; transition: color .15s; }
    .footer-email:hover { color: var(--ink); }

    @media (max-width: 720px) {
      .wrap { width: calc(100% - 32px); }
      .chart-grid { grid-template-columns: 1fr; }
      .strategy-grid { grid-template-columns: 1fr; }
      .strategy-select { min-width: 0; width: 100%; }
      .window-table { font-size: 13px; }
      .window-table th, .window-table td { padding: 8px 6px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <nav>
    <a class="back-link" href="/">← Will's VibeHome</a>
    <div class="nav-right">
      <span class="update-label" id="update-label">加载中…</span>
      <a class="gh-link" href="https://github.com/willyufan/aiinvestor" target="_blank" rel="noopener">GitHub ↗</a>
    </div>
  </nav>

  <header class="page-header">
    <h1 class="page-title">AI Investor<br><em>策略中心</em></h1>
    <p class="page-desc">持续追踪 A 股与沪港通量化策略回测结果，数据实时同步自 GitHub。</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="winners">胜出策略</button>
    <button class="tab-btn" data-tab="detail">策略详情</button>
  </div>

  <div id="loading" class="state-msg">数据加载中…</div>

  <!-- TAB 1: Winners -->
  <div class="tab-pane active" id="tab-winners" style="display:none">

    <div class="market-section" id="section-ashare">
      <h2 class="market-heading">A 股策略 <span class="market-badge">A-Share</span></h2>
      <div class="path-label">Path 1 · 稳健路线</div>
      <div class="strategy-grid" id="grid-path1"></div>
      <div class="path-label">Path 2 · 高收益探索</div>
      <div class="strategy-grid" id="grid-path2"></div>
    </div>

    <div class="market-section" id="section-hk" style="display:none">
      <h2 class="market-heading">沪港通策略 <span class="market-badge">HK Connect</span></h2>
      <div class="strategy-grid" id="grid-hk"></div>
    </div>

    <div class="chart-section">
      <h2 class="chart-title">各窗口 CAGR 对比</h2>
      <div class="chart-grid">
        <div class="chart-wrap">
          <div class="chart-label">Path 1 · 稳健路线</div>
          <div class="chart-canvas-wrap"><canvas id="chart-path1"></canvas></div>
        </div>
        <div class="chart-wrap">
          <div class="chart-label">Path 2 · 高收益探索</div>
          <div class="chart-canvas-wrap"><canvas id="chart-path2"></canvas></div>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB 2: Detail -->
  <div class="tab-pane" id="tab-detail" style="display:none">
    <div class="detail-selector">
      <label>选择策略</label>
      <select class="strategy-select" id="strategy-select">
        <option value="">— 请选择 —</option>
      </select>
    </div>
    <div id="detail-content" class="detail-content"></div>
  </div>

  <footer>
    <span class="footer-copy">© 2026 Will</span>
    <a class="footer-email" href="mailto:valselee@gmail.com">✉ valselee@gmail.com</a>
  </footer>

</div>

<script>
const SNAPSHOT_URL = 'https://raw.githubusercontent.com/willyufan/aiinvestor/main/results/public_snapshot.json';
let snapshotData = null;
let allStrategies = [];

// ── Helpers ──────────────────────────────────────────────────────────────────
const pct  = v => (v * 100).toFixed(1) + '%';
const fmt2 = v => parseFloat(v).toFixed(2);

function riskLabel(state) {
  const map = { risk_on: '满仓', caution: '减仓', risk_off: '空仓', unknown: '—' };
  return map[state] || state;
}

function windowLabel(tag) {
  const map = { since_2017_01:'2017', since_2020_01:'2020', since_2023_01:'2023', since_2025_01:'2025', since_2026_01:'2026' };
  return map[tag] || tag;
}

// ── Card ──────────────────────────────────────────────────────────────────────
function buildCard(s) {
  const m = s.metrics;
  const riskOff = s.risk_state === 'risk_off';
  const card = document.createElement('div');
  card.className = 'strategy-card' + (riskOff ? ' is-risk-off' : '');
  card.dataset.id = s.strategy_id;
  card.innerHTML = `
    <span class="card-arrow">→</span>
    <div class="card-window">${s.window_label}</div>
    <div class="card-name">${s.display_name}</div>
    <div class="card-metrics">
      <div class="metric">
        <div class="metric-label">CAGR</div>
        <div class="metric-val pos">${m.cagr ? pct(m.cagr) : '—'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Sharpe</div>
        <div class="metric-val neu">${m.sharpe ? fmt2(m.sharpe) : '—'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Max DD</div>
        <div class="metric-val neg">${m.max_drawdown ? pct(m.max_drawdown) : '—'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">总收益</div>
        <div class="metric-val neu">${m.total_return ? pct(m.total_return) : '—'}</div>
      </div>
    </div>
    <div class="card-footer">
      <span class="risk-badge ${s.risk_state}">${riskLabel(s.risk_state)} ${pct(s.target_exposure)}</span>
      <span class="exposure-val">${s.updated_at ? '更新 ' + s.updated_at : ''}</span>
    </div>`;
  card.addEventListener('click', () => goToDetail(s.strategy_id));
  return card;
}

// ── Charts ────────────────────────────────────────────────────────────────────
const CHART_COLORS = ['#c8392b','#1a7a4a','#2563eb','#b06000','#7c3aed'];

function buildWindowChart(canvasId, strategies) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  const tags = ['since_2017_01','since_2020_01','since_2023_01','since_2025_01'];
  const labels = tags.map(windowLabel);

  const datasets = strategies
    .filter(s => s.window_metrics && s.window_metrics.length > 0)
    .map((s, i) => ({
      label: s.display_name.length > 22 ? s.display_name.slice(0, 22) + '…' : s.display_name,
      data: tags.map(tag => {
        const wm = (s.window_metrics || []).find(w => w.tag === tag);
        return wm ? +(wm.cagr * 100).toFixed(1) : null;
      }),
      backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + '99',
      borderColor: CHART_COLORS[i % CHART_COLORS.length],
      borderWidth: 1.5,
    }));

  new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 10, family: 'Inter' }, boxWidth: 12, padding: 10 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw}%` } },
      },
      scales: {
        y: { ticks: { callback: v => v + '%', font: { size: 11 } }, grid: { color: '#e0d8cc' } },
        x: { ticks: { font: { size: 11 } }, grid: { display: false } },
      },
    },
  });
}

// ── Detail ────────────────────────────────────────────────────────────────────
function goToDetail(strategyId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'detail'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-detail'));
  document.querySelectorAll('.tab-pane').forEach(p => p.style.display = p.classList.contains('active') ? 'block' : 'none');
  const sel = document.getElementById('strategy-select');
  sel.value = strategyId;
  renderDetail(strategyId);
}

function renderDetail(strategyId) {
  const container = document.getElementById('detail-content');
  if (!strategyId) { container.innerHTML = '<p style="color:var(--muted);font-size:14px">请从上方选择一个策略。</p>'; return; }
  const s = allStrategies.find(x => x.strategy_id === strategyId);
  if (!s) { container.innerHTML = '<p style="color:var(--muted)">未找到策略数据。</p>'; return; }

  const m = s.metrics;
  const marketLabel = s.market_scope === 'hkconnect' ? '沪港通' : 'A股';

  // Window metrics table
  const winRows = (s.window_metrics || []).map(w => `
    <tr${w.tag === s.sample_tag ? ' class="highlight"' : ''}>
      <td>${w.label} 窗口${w.tag === s.sample_tag ? ' ★' : ''}</td>
      <td class="${w.cagr > 0 ? 'pos' : 'neg'}" style="color:${w.cagr > 0 ? 'var(--green)' : 'var(--accent)'};">${pct(w.cagr)}</td>
      <td>${fmt2(w.sharpe)}</td>
      <td style="color:var(--accent)">${pct(w.max_drawdown)}</td>
      <td>${pct(w.total_return)}</td>
    </tr>`).join('');

  // Holdings
  const weights = s.latest_weights || [];
  const maxW = Math.max(...weights.map(r => r.weight));
  const holdingsHTML = weights.length === 0
    ? '<p style="color:var(--muted);font-size:13px">持仓数据暂无。</p>'
    : `<div class="holdings-grid">${weights.map(r => {
        const isCash = r.ts_code === 'CASH';
        const barW = maxW > 0 ? (r.weight / maxW * 100).toFixed(1) : 0;
        return `<div class="holding-item${isCash ? ' cash-holding' : ''}">
          <div class="holding-top">
            <div>
              <div class="holding-name">${r.name}</div>
              <div class="holding-code">${r.ts_code}</div>
            </div>
            <div class="holding-weight">${pct(r.weight)}</div>
          </div>
          <div class="holding-bar-wrap"><div class="holding-bar" style="width:${barW}%"></div></div>
        </div>`;
      }).join('')}</div>`;

  container.innerHTML = `
    <div class="detail-header">
      <h2 class="detail-name">${s.display_name}</h2>
      <div class="detail-meta">
        <span>市场：${marketLabel}</span>
        <span>路径：${s.path.toUpperCase()}</span>
        <span>类型：${s.winner_type}</span>
        <span class="risk-badge ${s.risk_state}" style="padding:3px 10px">${riskLabel(s.risk_state)} ${pct(s.target_exposure)}</span>
        ${s.updated_at ? `<span>更新：${s.updated_at}</span>` : ''}
      </div>
    </div>

    <div style="margin-bottom:28px">
      <div class="detail-section-title">各窗口表现（★ = 当前胜出窗口）</div>
      <table class="window-table">
        <thead><tr><th>窗口</th><th>CAGR</th><th>Sharpe</th><th>最大回撤</th><th>总收益</th></tr></thead>
        <tbody>${winRows}</tbody>
      </table>
    </div>

    <div class="holdings-wrap">
      <div class="detail-section-title">当前持仓目标权重</div>
      ${holdingsHTML}
    </div>`;
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch(SNAPSHOT_URL);
    if (!res.ok) throw new Error('fetch failed');
    snapshotData = await res.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('update-label').textContent = `更新于 ${snapshotData.as_of}`;

    const path1 = snapshotData.path1 || [];
    const path2 = snapshotData.path2 || [];
    const hk    = snapshotData.hkconnect || [];
    allStrategies = [...path1, ...path2, ...hk];

    // Grids
    const g1 = document.getElementById('grid-path1');
    const g2 = document.getElementById('grid-path2');
    const gHk = document.getElementById('grid-hk');
    path1.forEach(s => g1.appendChild(buildCard(s)));
    path2.forEach(s => g2.appendChild(buildCard(s)));
    if (hk.length > 0) {
      hk.forEach(s => gHk.appendChild(buildCard(s)));
      document.getElementById('section-hk').style.display = 'block';
    }

    // Show tab content
    document.getElementById('tab-winners').style.display = 'block';

    // Charts
    buildWindowChart('chart-path1', path1.filter(s => s.winner_type !== 'robust candidate'));
    buildWindowChart('chart-path2', path2.filter(s => s.winner_type !== 'robust candidate'));

    // Populate select
    const sel = document.getElementById('strategy-select');
    const groups = { 'A股 · Path 1': path1, 'A股 · Path 2': path2, '沪港通': hk };
    Object.entries(groups).forEach(([label, list]) => {
      if (!list.length) return;
      const grp = document.createElement('optgroup');
      grp.label = label;
      list.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.strategy_id;
        opt.textContent = `[${s.window_label}] ${s.display_name.slice(0, 40)}${s.display_name.length > 40 ? '…' : ''}`;
        grp.appendChild(opt);
      });
      sel.appendChild(grp);
    });
    sel.addEventListener('change', e => renderDetail(e.target.value));

  } catch (e) {
    document.getElementById('loading').textContent = '数据加载失败，请稍后重试。';
    console.error(e);
  }
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    const target = btn.dataset.tab;
    document.querySelectorAll('.tab-pane').forEach(p => {
      const active = p.id === 'tab-' + target;
      p.classList.toggle('active', active);
      p.style.display = active ? 'block' : 'none';
    });
  });
});

load();
</script>
